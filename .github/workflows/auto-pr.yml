name: Auto PR (Sync & Translate)

on:
  schedule:
    - cron: '17 3 * * 1' # Weekly on Monday at 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

env:
  UPSTREAM_REPO: vuejs/docs
  SYNC_BRANCH: sync
  TARGET_BRANCH: main

jobs:
  # ── Step 1: Merge upstream & translate changed content ───────────
  merge-and-translate:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install
      - run: node scripts/auto-pr.js

  # ── Step 2: Create PR ────────────────────────────────────────────
  create-pr:
    needs: merge-and-translate
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Fetch upstream & sync branches
        run: |
          git fetch origin upstream sync

      - name: Create sync PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          upstream_hash=$(git show -s --format='%h' origin/upstream)
          last_sync_hash=$(git log origin/${{ env.TARGET_BRANCH }} --format='%b' \
            | grep -oP 'sync #\K\w{7,8}' | head -1)

          if [ -z "$last_sync_hash" ]; then
            compare_url="https://github.com/${{ env.UPSTREAM_REPO }}"
          else
            compare_url="https://github.com/${{ env.UPSTREAM_REPO }}/compare/${last_sync_hash}...${upstream_hash}"
          fi

          title="Sync #${upstream_hash}"

          # Write PR body to temp file (avoids indentation issues)
          printf '%s\n\n%s\n\n---\n%s\n' \
            "## Description of Problem" \
            "$compare_url" \
            "*This PR was automatically generated by the weekly sync workflow.*" \
            > /tmp/pr_body.md

          pr_url=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base "${{ env.TARGET_BRANCH }}" \
            --head "${{ env.SYNC_BRANCH }}" \
            --title "$title" \
            --body-file /tmp/pr_body.md \
            --label "从英文版同步" \
            --label "请使用 merge commit 合并")

          echo "PR created: $pr_url"
          echo "number=$(echo "$pr_url" | grep -oP '\d+$')" >> "$GITHUB_OUTPUT"

  # ── Step 3: Copilot review ───────────────────────────────────────
  copilot-review:
    needs: create-pr
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr=${{ needs.create-pr.outputs.pr_number }}
          repo="${{ github.repository }}"

          # Assign Copilot as reviewer
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${repo}/pulls/${pr}/requested_reviewers" \
            -d '{"reviewers":["copilot-pull-request-reviewer[bot]"]}'

          # Post review instruction comment
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${repo}/issues/${pr}/comments" \
            -d '{"body":"@copilot review\n\nPlease review this automated sync PR:\n1. Translation accuracy per [conventions](https://github.com/'"${repo}"'/blob/main/.claude/skills/vuejs-docs-zh-cn/SKILL.md)\n2. No unintended content changes\n3. Markdown formatting preserved\n4. Code blocks and links intact"}'
